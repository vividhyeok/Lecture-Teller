<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecture Teller</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="mobile-sidebar-closed">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="side-header">
        <div class="brand">
          <button id="toggleSidebar" class="icon-btn" type="button" aria-label="사이드바 토글" title="사이드바 닫기">
            <svg viewBox="0 0 24 24">
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="M9 3v18" />
            </svg>
          </button>
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="openSettings" class="icon-btn" type="button" aria-label="설정" title="설정">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
              </path>
            </svg>
          </button>
          <button id="addSubject" class="icon-btn accent" type="button" aria-label="과목 추가" title="과목 추가">
            <svg viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
      </div>

      <div id="subjectList" class="library-list"></div>
    </aside>

    <main class="workspace">
      <div class="workspace-shell">
        <header class="workspace-top">
          <div class="context-cluster">
            <button id="openSidebar" class="icon-btn sidebar-open-btn" type="button" aria-label="사이드바 열기"
              title="사이드바 열기">
              <svg viewBox="0 0 24 24">
                <rect width="18" height="18" x="3" y="3" rx="2" />
                <path d="M9 3v18" />
              </svg>
            </button>
            <div id="subjectChip" class="context-chip"><strong>과목 없음</strong></div>
            <div id="unitChip" class="context-chip"><strong>단원 없음</strong></div>
            <div id="statusChip" class="context-chip accent"><strong>대기</strong></div>
          </div>

          <div class="top-actions">
            <button id="addUnitHero" class="icon-btn" type="button" aria-label="단원 추가" title="단원 추가">
              <svg viewBox="0 0 24 24">
                <path d="M7 4h7l5 5v11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z" />
                <path d="M14 4v5h5" />
                <path d="M12 11v6M9 14h6" />
              </svg>
            </button>
            <button id="deleteUnitHero" class="icon-btn danger" type="button" aria-label="현재 단원 삭제" title="현재 단원 삭제">
              <svg viewBox="0 0 24 24">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M19 6l-1 14H6L5 6" />
                <path d="M10 11v6M14 11v6" />
              </svg>
            </button>
          </div>
        </header>

        <nav class="tab-strip" aria-label="작업 탭">
          <button class="tab-btn active" type="button" data-tab="explore">
            <svg viewBox="0 0 24 24">
              <path d="m3 7 9-4 9 4-9 4-9-4Z" />
              <path d="m3 12 9 4 9-4" />
              <path d="m3 17 9 4 9-4" />
            </svg>
            <span class="tab-label">탐색</span>
          </button>
          <button class="tab-btn" type="button" data-tab="compose">
            <svg viewBox="0 0 24 24">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            <span class="tab-label">작성</span>
          </button>
          <button class="tab-btn" type="button" data-tab="player">
            <svg viewBox="0 0 24 24">
              <path d="M8 6v12l10-6Z" />
            </svg>
            <span class="tab-label">재생</span>
          </button>
        </nav>

        <section id="panel-explore" class="tab-panel active">
          <div class="summary-grid">
            <article class="surface">
              <div class="surface-head">
                <div>
                  <span class="eyebrow">Focus</span>
                  <h1 id="focusTitle">선택 없음</h1>
                </div>
              </div>
              <div id="focusBody" class="focus-body"></div>
            </article>

            <article class="surface">
              <div class="surface-head">
                <div>
                  <span class="eyebrow">Stats</span>
                  <h2>현황</h2>
                </div>
              </div>
              <div id="exploreMeta" class="mini-stack"></div>
            </article>
          </div>
        </section>

        <section id="panel-compose" class="tab-panel">
          <article class="surface composer-surface">
            <div class="surface-head">
              <div>
                <span class="eyebrow">Compose</span>
                <h2>텍스트</h2>
              </div>
              <div class="composer-tools">
                <div id="composeHint" class="composer-headline"></div>
                <label class="voice-select" for="voice">
                  <span>Voice</span>
                  <select id="voice">
                    <option value="alloy">alloy</option>
                    <option value="echo">echo</option>
                    <option value="fable">fable</option>
                    <option value="onyx">onyx</option>
                    <option value="nova">nova</option>
                    <option value="shimmer">shimmer</option>
                  </select>
                </label>
                <button id="generate" class="primary-btn" type="button" title="오디오 생성">
                  <span id="generateSpinner" class="spin" hidden></span>
                  <svg viewBox="0 0 24 24">
                    <path
                      d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="text-wrap">
              <textarea id="inputText" placeholder="Claude 응답 붙여넣기" spellcheck="false"></textarea>
              <div class="text-meta">
                <span id="cleanState">정리 대기</span>
                <span id="charCount">0 / 4096</span>
              </div>
            </div>
          </article>
        </section>

        <section id="panel-player" class="tab-panel">
          <article class="surface player-surface">
            <div class="surface-head">
              <div>
                <span class="eyebrow">Player</span>
                <h2>오디오</h2>
              </div>
            </div>
            <div id="detail" class="player-body"></div>
          </article>
        </section>
      </div>
    </main>
  </div>

  <div id="floatingPlayer" class="floating-player">
    <div class="fp-header">
      <div class="fp-title">
        <strong id="fpUnit">단원</strong>
        <span id="fpSubject">과목</span>
      </div>
      <button id="closeFloatingPlayer" class="icon-btn" type="button" aria-label="닫기" title="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div id="fpBody" class="fp-body"></div>
    <div class="fp-footer">
      <audio id="fpAudio" controls></audio>
    </div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="overlay-card">
      <div class="spin"></div>
      <div>TTS 생성 중</div>
    </div>
  </div>

  <div id="settingsModal" class="overlay" aria-hidden="true"
    style="justify-content: center; align-items: center; z-index: 100;">
    <div class="overlay-card"
      style="width: 420px; max-width: 90%; flex-direction: column; gap: 20px; align-items: stretch; text-align: left;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <strong style="font-size: 1.1rem;">환경 설정</strong>
        <button id="closeSettings" class="icon-btn" type="button" style="margin: -8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="settingApiKey" style="font-size: 0.85rem; color: var(--muted);">OpenAI API Key (기본값: .env)</label>
        <input type="password" id="settingApiKey" class="surface-input" placeholder="sk-..."
          style="padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.3); color: white;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="settingDefaultVoice" style="font-size: 0.85rem; color: var(--muted);">기본 목소리</label>
        <select id="settingDefaultVoice"
          style="padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.3); color: white; font: inherit; outline: none;">
          <option value="">— 없음 (매번 선택) —</option>
          <option value="alloy">alloy</option>
          <option value="echo">echo</option>
          <option value="fable">fable</option>
          <option value="onyx">onyx</option>
          <option value="nova">nova</option>
          <option value="shimmer">shimmer</option>
        </select>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="settingAudioDir" style="font-size: 0.85rem; color: var(--muted);">오디오 저장 경로 (기본값: /audio)</label>
        <input type="text" id="settingAudioDir" class="surface-input" placeholder="C:\Custom\Audio\Path"
          style="padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.3); color: white;">
        <span style="font-size: 0.75rem; color: var(--subtle); line-height: 1.4;">경로를 지정하면 해당 폴더에 저장됩니다. FastAPI 서버가 해당
          경로의 파일 읽기/쓰기 권한을 가져야 합니다.</span>
      </div>

      <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
        <button id="saveSettings" class="primary-btn" type="button" style="padding: 0 24px;">저장</button>
      </div>
    </div>
  </div>


  <div id="promptModal" class="overlay" aria-hidden="true"
    style="justify-content: center; align-items: center; z-index: 100;">
    <div class="overlay-card"
      style="width: 360px; max-width: 90%; flex-direction: column; gap: 20px; align-items: stretch; text-align: left;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <strong id="promptTitle" style="font-size: 1.1rem;">입력</strong>
        <button id="closePrompt" class="icon-btn" type="button" style="margin: -8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <input type="text" id="promptInput" class="surface-input" placeholder="이름을 입력하세요"
          style="padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(0,0,0,0.3); color: white;">
      </div>

      <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
        <button id="submitPrompt" class="primary-btn" type="button" style="padding: 0 24px;">확인</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="overlay" aria-hidden="true"
    style="justify-content: center; align-items: center; z-index: 100;">
    <div class="overlay-card"
      style="width: 360px; max-width: 90%; flex-direction: column; gap: 20px; align-items: stretch; text-align: left;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <strong id="confirmTitle" style="font-size: 1.1rem;">확인</strong>
        <button id="closeConfirm" class="icon-btn" type="button" style="margin: -8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <p id="confirmMessage" style="color: var(--text-200); font-size: 0.95rem; margin: 0; line-height: 1.5;"></p>
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px;">
        <button id="cancelConfirm" class="outline-btn" type="button" style="padding: 0 24px;">취소</button>
        <button id="submitConfirm" class="primary-btn" type="button"
          style="padding: 0 24px; background: #e04a4a; border-color: #d13e3e;">삭제</button>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="true"></div>

  <nav class="mobile-dock" aria-label="모바일 탭">
    <button class="tab-btn active" type="button" data-tab="explore">
      <svg viewBox="0 0 24 24">
        <path d="m3 7 9-4 9 4-9 4-9-4Z" />
        <path d="m3 12 9 4 9-4" />
        <path d="m3 17 9 4 9-4" />
      </svg>
      <span class="tab-label">탐색</span>
    </button>
    <button class="tab-btn" type="button" data-tab="compose">
      <svg viewBox="0 0 24 24">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z" />
      </svg>
      <span class="tab-label">작성</span>
    </button>
    <button class="tab-btn" type="button" data-tab="player">
      <svg viewBox="0 0 24 24">
        <path d="M8 6v12l10-6Z" />
      </svg>
      <span class="tab-label">재생</span>
    </button>
  </nav>

  <script src="/static/main.js"></script>
</body>

</html>
